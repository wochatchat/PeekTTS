name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.2.12479018'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Download sherpa-onnx native libraries
        run: |
          chmod +x scripts/download_native_libs.sh
          ./scripts/download_native_libs.sh v1.13.4

      - name: Verify native libraries
        run: |
          echo "=== Native libraries ==="
          find app/src/main/jniLibs -name "*.so" | head -20
          ls -la app/src/main/jniLibs/arm64-v8a/ || exit 1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List built APK
        run: |
          echo "=== Built APK ==="
          find . -name "*.apk" -path "*/release/*" -exec ls -lh {} \;

      - name: Copy APK to apk folder
        run: |
          mkdir -p apk
          APK_PATH=$(find . -name "*.apk" -path "*/release/*" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "apk/PeekTTS-v${{ github.run_number }}.apk"
            echo "✓ APK copied to apk/PeekTTS-v${{ github.run_number }}.apk"
            ls -lh apk/
          else
            echo "✗ No APK found!"
            exit 1
          fi

      - name: Commit APK to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/*.apk
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: build APK #${{ github.run_number }} [skip ci]"
            git push
            echo "✓ APK committed and pushed"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PeekTTS-release-apk
          path: apk/*.apk
          retention-days: 90
